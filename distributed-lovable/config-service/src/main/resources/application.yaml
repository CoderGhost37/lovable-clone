spring:
  application:
    name: config-service

  cloud:
    config.server.git:
      uri: https://github.com/CoderGhost37/lovable-config-server
      username: CoderGhost37
      password:
      default-label: main

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    config:
      enabled: false

---

spring:
  config:
    activate:
      on-profile: k8s

  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false