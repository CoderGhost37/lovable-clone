# k8s/stateful/pgvector.yaml

apiVersion: v1
kind: ConfigMap
metadata:
  name: pgvector-init
  namespace: lovable-core
data:
  init.sh: |
    #!/bin/bash
    set -e

    run()         { psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" "$@"; }
    db_exists()   { run -tc "SELECT 1 FROM pg_database WHERE datname='$1'" | grep -q 1; }
    role_exists() { run -tc "SELECT 1 FROM pg_roles   WHERE rolname='$1'" | grep -q 1; }

    # Create databases (idempotent)
    db_exists account_db      || run -c "CREATE DATABASE account_db"
    db_exists workspace_db    || run -c "CREATE DATABASE workspace_db"
    db_exists intelligence_db || run -c "CREATE DATABASE intelligence_db"

    # Create roles (idempotent)
    role_exists account_user      || run -c "CREATE USER account_user      WITH PASSWORD '${ACCOUNT_DB_PASSWORD}'"
    role_exists workspace_user    || run -c "CREATE USER workspace_user    WITH PASSWORD '${WORKSPACE_DB_PASSWORD}'"
    role_exists intelligence_user || run -c "CREATE USER intelligence_user WITH PASSWORD '${INTELLIGENCE_DB_PASSWORD}'"

    # Grant database-level privileges
    run -c "GRANT ALL PRIVILEGES ON DATABASE account_db      TO account_user"
    run -c "GRANT ALL PRIVILEGES ON DATABASE workspace_db    TO workspace_user"
    run -c "GRANT ALL PRIVILEGES ON DATABASE intelligence_db TO intelligence_user"

    # Grant schema-level privileges
    run --dbname=account_db      -c "GRANT ALL ON SCHEMA public TO account_user"
    run --dbname=workspace_db    -c "GRANT ALL ON SCHEMA public TO workspace_user"
    run --dbname=intelligence_db -c "GRANT ALL ON SCHEMA public TO intelligence_user"

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgvector
  namespace: lovable-core
spec:
  selector:
    matchLabels:
      app: pgvector
  serviceName: pgvector
  replicas: 1
  template:
    metadata:
      labels:
        app: pgvector
    spec:
      tolerations:
        - key: kubernetes.io/arch
          operator: Equal
          value: amd64
          effect: NoSchedule
      containers:
        - name: pgvector
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: postgres          # default db, required by the image
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: ACCOUNT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ACCOUNT_DB_PASSWORD
            - name: WORKSPACE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: WORKSPACE_DB_PASSWORD
            - name: INTELLIGENCE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: INTELLIGENCE_DB_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: initdb
          configMap:
            name: pgvector-init
            defaultMode: 0755         # must be executable for .sh files
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: pgvector
  namespace: lovable-core
spec:
  clusterIP: None   # headless — required for StatefulSet DNS
  selector:
    app: pgvector
  ports:
    - port: 5432